<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrocaTech Escolar</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
</head>
<body>

    <div class="login-container">
        <h2>🔄 TrocaTech</h2>
        <p>Acesse com sua matricula para continuar</p>

        <form id="form-login">
            <div class="input-group">
                <label for="cpf">MATRICULA</label>
                <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Sua senha secreta" required>
            </div>

            <a href="index.html">Entrar no Sistema</a>
        </form>

        <div class="links">
            <a href="#">Esqueci minha senha</a>
            <a href="#">Primeiro acesso? Crie sua conta</a>
        </div>
    </div>

</body>
</html>
